name: Release package

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Verify release tag matches package version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          package_version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          tag_version="${RELEASE_TAG#v}"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Release tag $RELEASE_TAG does not match package.json version $package_version" >&2
            exit 1
          fi
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"

      - name: Test
        run: npm test

      - name: Pack
        id: pack
        run: |
          set -euo pipefail
          npm pack --json > pack.json
          tarball="$(node -e "const fs = require('fs'); const pack = JSON.parse(fs.readFileSync('pack.json', 'utf8')); console.log(pack[0].filename);")"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Check npm version
        id: npm_version
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: |
          set -euo pipefail
          if npm view "agent-systems@$PACKAGE_VERSION" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm_version.outputs.published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --registry=https://registry.npmjs.org

      - name: Skip npm publish
        if: steps.npm_version.outputs.published == 'true'
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: echo "agent-systems@$PACKAGE_VERSION is already published on npm; skipping publish."

      - name: Attach tarball to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" "${{ steps.pack.outputs.tarball }}" --clobber
